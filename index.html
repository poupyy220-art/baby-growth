        const parseDate = (dateStr) => {
            if (!dateStr) return new Date(0);
            try {
                if (dateStr.includes('/')) {
                    const parts = dateStr.split('/');
                    if (parts.length === 3) return new Date(parts[0], parts[1] - 1, parts[2]);

      const calculateAge = () => {
    const today = new Date();

    let years = today.getFullYear() - BIRTH_DATE.getFullYear();
    let months = today.getMonth() - BIRTH_DATE.getMonth();
    let days = today.getDate() - BIRTH_DATE.getDate();

    if (days < 0) {
        months--;
        const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
        days += prevMonth.getDate();
    }

    if (months < 0) {
        years--;
        months += 12;
    }

    return `${years}Y ${months}M ${days}D`;
};

// 👇 在這裡新增
const calculateDays = () => {
    const today = new Date();
    const diff = today - BIRTH_DATE;
    return Math.floor(diff / (1000 * 60 * 60 * 24));
};

const calculateBirthdayCountdown = () => {
    const today = new Date();
    let nextBirthday = new Date(today.getFullYear(), BIRTH_DATE.getMonth(), BIRTH_DATE.getDate());

    if (today > nextBirthday) {
        nextBirthday = new Date(today.getFullYear() + 1, BIRTH_DATE.getMonth(), BIRTH_DATE.getDate());
    }

    const diff = nextBirthday - today;
    return Math.ceil(diff / (1000 * 60 * 60 * 24));
};

const calculateProgress = () => {
    const today = new Date();
    const secondBirthday = new Date(BIRTH_DATE.getFullYear() + 2, BIRTH_DATE.getMonth(), BIRTH_DATE.getDate());
    const total = secondBirthday - BIRTH_DATE;
    const current = today - BIRTH_DATE;
    const percent = Math.min(100, Math.max(0, Math.round((current / total) * 100)));
    return percent;
};

                            who15: parseFloat(r.who15),
                            height: r.height ? parseFloat(r.height) : null, 
                            head: r.head ? parseFloat(r.head) : null
                        }));

                        const cleanMedical = medical.filter(r => r.date).sort((a,b) => parseDate(b.date) - parseDate(a.date));
                        const cleanTravel = travel.filter(r => r.date).sort((a,b) => parseDate(b.date) - parseDate(a.date));
                        const cleanLogs = logs.filter(r => r.date).sort((a,b) => parseDate(b.date) - parseDate(a.date));
                        const cleanDev = development.filter(r => r.date).sort((a,b) => parseDate(b.date) - parseDate(a.date));

                        setData({ growth: cleanGrowth, medical: cleanMedical, travel: cleanTravel, logs: cleanLogs, development: cleanDev });
                        if (cleanGrowth.length === 0 && cleanMedical.length === 0 && cleanLogs.length === 0 && cleanDev.length === 0) throw new Error("Empty Data");

                    } catch (e) {
                        console.error(e);
                        setError("讀取失敗：請確認 Google 試算表已「發布到網路」");
                    } finally {
                        setLoading(false);
                        // Dashboard 載入完畢，不需要全域 loader 了
                    }
                };
                loadData();
              setAgeStr(calculateAge());
              setDaysOld(calculateDays());
              setBirthdayCountdown(calculateBirthdayCountdown());
              setProgressPercent(calculateProgress());


            }, []);

            const exportAllToCSV = () => {
                let csvContent = "\uFEFF=== 下載自雲端備份 ===\n日期,標題,標籤,家長紀錄,AI分析,親子共玩\n";
                data.logs.forEach(log => { csvContent += `"${log.date}","${log.title}","${log.tag}","${log.parent_text?.replace(/\n/g, ' ')}","${log.ai_text?.replace(/\n/g, ' ')}","${log.game?.replace(/\n/g, ' ')}"\n`; });
                if (data.development.length > 0) {
                    csvContent += "\n=== 發展月報 (Development) ===\n日期,標題,分析內容,建議\n";
                    data.development.forEach(dev => { csvContent += `"${dev.date}","${dev.title}","${dev.analysis?.replace(/\n/g, ' ')}","${dev.suggestion?.replace(/\n/g, ' ')}"\n`; });
                }
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
                link.setAttribute("download", `Meimei_Cloud_Backup.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const renderIcon = (iconName, className) => {
                const IconComponent = Icons[iconName] || Icons.Star; 
                if (typeof className === 'number') return <IconComponent size={className} />;
                return <IconComponent size={T.iconVal} className={className} />;
            };
            
            const latestGrowthData = useMemo(() => {
                if (!data.growth || data.growth.length === 0) return null;
                const validRows = data.growth.filter(r => r.meimei !== null);
                return validRows.length > 0 ? validRows[validRows.length - 1] : null;
            }, [data.growth]);

const journey = useMemo(()=>{

const medicalItems = data.medical
.filter(r=>r.type==="vaccine")
.map(r=>({
date:r.date,
title:r.title,
text:r.note,
type:'medical'
}))

const travelItems = data.travel.map(r=>({
date:r.date,
title:r.title,
text:r.highlight,
type:'travel'
}))

const devItems = data.development.map(r=>({
date:r.date,
title:r.title,
text:r.analysis,
type:'dev'
}))

const combined=[
...medicalItems,
...travelItems,
...devItems
]

return combined.sort((a,b)=>parseDate(b.date)-parseDate(a.date))

},[data])

const timeline = useMemo(()=>{

const logItems = data.logs.map(r => ({
date: r.date,
title: r.title,
text: r.parent_text,
type: 'log'
}));

const medicalItems = data.medical.map(r => ({
date: r.date,
title: r.title,
text: r.note,
type: 'medical'
}));

const travelItems = data.travel.map(r => ({
date: r.date,
title: r.title,
text: r.highlight,
type: 'travel'
}));

const devItems = data.development.map(r => ({
date: r.date,
title: r.title,
text: r.analysis,
type: 'dev'
}));

const combined = [
...logItems,
...medicalItems,
...travelItems,
...devItems
];

return combined.sort((a,b)=>parseDate(b.date)-parseDate(a.date));

},[data]);

            const getGrowthDisplay = () => {
                if (!latestGrowthData) return "...";
                const w = latestGrowthData.meimei ? `${latestGrowthData.meimei}kg` : '';
                const h = latestGrowthData.height ? ` ${latestGrowthData.height}cm` : '';
                return `${w}${h}`;
            };

            if (loading) return (
                <div className="fixed inset-0 bg-[#fff1f2] flex flex-col justify-center items-center z-50">
                    <div className="spinner">👶</div>
                    <p className="text-pink-500 font-bold mt-2">資料同步中...</p>
                </div>
            );

            if (error) return <div className="text-center p-10 text-red-500">{error}</div>;

            return (
                <div className={`${T.container} mx-auto px-4 pb-20 transition-all duration-300`}>
                    <div className="bg-white/90 backdrop-blur rounded-3xl p-5 text-center shadow-sm mt-4 border border-white relative overflow-hidden">
                        <div className="flex justify-between mb-2 relative z-10">
                             <button onClick={() => setLargeText(!largeText)} className="text-xs bg-gray-100 text-gray-600 px-3 py-1.5 rounded-full font-bold shadow-sm active:scale-95 transition flex items-center gap-1 hover:bg-gray-200">{renderIcon('Aa', 14)} {largeText ? '標準' : '大字'}</button>
                            <button onClick={exportAllToCSV} className="text-xs bg-green-500 text-white px-3 py-1.5 rounded-full font-bold shadow-sm active:scale-95 transition flex items-center gap-1">{renderIcon('Save', 14)} 備份</button>
                        </div>
                        <div className="bg-pink-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 text-3xl shadow-inner relative z-10">👶</div>
                        <h1 className={`${T.h1} font-bold text-gray-800 relative z-10`}>妹妹成長紀錄 <span className={`${T.small} text-pink-400 font-normal`}>Cloud</span></h1>
                        <div className="mt-3 flex flex-wrap justify-center gap-2 relative z-10">
    <span className={`${T.small} bg-white px-2 py-1 rounded-full border border-pink-100 font-bold text-gray-600`}>
        {ageStr}
    </span>

    <span className={`${T.small} bg-white px-2 py-1 rounded-full border border-indigo-100 font-bold text-indigo-600`}>
        {daysOld} days
    </span>

    <span className={`${T.small} bg-white px-2 py-1 rounded-full border border-yellow-100 font-bold text-yellow-700`}>
        🎂 {birthdayCountdown} days
    </span>

    <span className={`${T.small} bg-white px-2 py-1 rounded-full border border-purple-100 font-bold text-gray-600`}>
        {getGrowthDisplay()}
    </span>
</div>
                        <Icons.CloudSun className="absolute top-4 left-4 text-yellow-300 opacity-50" size={28}/>
<div className="mt-4 relative z-10">
    <div className="flex justify-between text-[10px] text-gray-400 mb-1 px-1">
        <span>0Y</span>
        <span>2Y milestone</span>
    </div>
    <div className="w-full bg-pink-100 rounded-full h-2 overflow-hidden">
        <div
            className="bg-pink-500 h-2 rounded-full transition-all duration-500"
            style={{ width: `${progressPercent}%` }}
        ></div>
    </div>
    <div className="text-[10px] text-pink-500 font-bold mt-1">
        成長進度 {progressPercent}%
    </div>
</div>
                    </div>

                    <div className="flex gap-2 mt-4 overflow-x-auto pb-1 no-scrollbar justify-center">
                      {['journey','timeline','log', 'dev', 'health', 'travel'].map(t => (
                            <button key={t} onClick={()=>setTab(t)} className={`px-4 py-2 rounded-full ${T.small} font-bold whitespace-nowrap transition-all ${tab===t ? 'tab-btn-active' : 'tab-btn-inactive'}`}>{
t==='journey'?'⭐ 人生時間軸':
t==='timeline'?'🕰 Timeline':
t==='health'?'🏥 醫療':
t==='travel'?'✈️ 足跡':
t==='dev'? '📊 發展月報':
'📅 時光機'
}</button>
                        ))}
                    </div>

                    <div className="mt-4 space-y-3">
                        {tab === 'health' && (
                            <>
                                <div className="bg-white p-4 rounded-3xl shadow-sm border border-pink-100 mb-4">
                                    <h3 className={`${T.small} font-bold text-gray-800 mb-2 flex items-center gap-2`}>{renderIcon('Ruler', T.iconVal)} 生長曲線 (WHO)</h3>
                                    <SafeChart data={data.growth} />
                                </div>


{/* 新增這段 */}
<div className="bg-white p-4 rounded-3xl shadow-sm border border-purple-100 mb-4">

<h3 className={`${T.small} font-bold text-purple-700 mb-2`}>
妹妹發展雷達
</h3>

<DevelopmentRadar data={data.development} />
<DevelopmentAnalysis data={data.development} />

</div>

                                {data.medical.map((rec, i) => (
                                    <div key={i} className={`bg-white p-4 rounded-2xl shadow-sm border-l-4 ${rec.type==='sick'?'border-orange-300':'border-blue-300'}`}>
                                        <div className="flex justify-between items-start">
                                            <span className={`${T.small} text-gray-400 font-mono`}>{rec.date}</span>
                                            <span className={`text-[10px] px-1.5 py-0.5 rounded text-white ${rec.type==='sick'?'bg-orange-400':'bg-blue-400'}`}>{rec.loc}</span>
                                        </div>
                                        <h3 className={`${T.h3} font-bold text-gray-800 mt-1`}>{rec.title}</h3>
                                        <div className="flex justify-between items-end mt-1">
                                            <p className={`${T.small} text-gray-500 w-3/4`}>{rec.note}</p>
                                            <span className={`${T.small} font-bold text-pink-600`}>{rec.detail && rec.detail.split('|')[0]}</span>
                                        </div>
                                        {rec.analysis && <div className={`mt-2 pt-2 border-t border-gray-100 ${T.small} text-indigo-800 bg-indigo-50 p-2 rounded`}><span className="font-bold mr-1">💡 醫師觀點：</span>{rec.analysis}</div>}
                                    </div>
                                ))}
                            </>
                        )}

                        {tab === 'travel' && data.travel.map((rec, i) => (
                            <div key={i} className="bg-white p-4 rounded-2xl shadow-sm flex flex-col gap-2 border border-green-50">
                                <div className="flex items-center gap-3">
                                    <div className="text-xl bg-green-50 w-12 h-12 flex items-center justify-center rounded-full shadow-inner">{renderIcon(rec.icon, "text-green-600 w-6 h-6")}</div>
                                    <div className="flex-1">
                                        <div className="flex justify-between">
                                            <h3 className={`${T.h3} font-bold text-gray-800`}>{rec.title}</h3>
                                            <span className={`${T.small} text-gray-400`}>{rec.date}</span>
                                        </div>
                                        <div className={`${T.small} text-green-600`}>{rec.location}</div>
                                        <p className={`${T.small} text-gray-400 mt-0.5`}>{rec.highlight}</p>
                                    </div>
                                </div>
                                {rec.analysis && <div className={`mt-1 bg-green-50 p-2 rounded-lg ${T.small} text-green-800`}><span className="font-bold">🧠 發展意義：</span>{rec.analysis}</div>}
                            </div>
                        ))}


{tab === 'journey' && journey.map((item,i)=>{

const color={
medical:'border-blue-300',
travel:'border-green-300',
dev:'border-purple-300'
}

const label={
medical:'🏥 醫療里程碑',
travel:'✈️ 人生旅行',
dev:'📊 發展突破'
}

return(

<div key={i} className={`bg-white p-5 rounded-2xl shadow-sm border-l-4 ${color[item.type]}`}>

<div className="flex justify-between mb-1">

<span className={`${T.small} text-gray-400`}>
{item.date}
</span>

<span className={`${T.small} font-bold text-gray-500`}>
{label[item.type]}
</span>

</div>

<h3 className={`${T.h3} font-bold text-gray-800`}>
{item.title}
</h3>

<p className={`${T.small} text-gray-600 mt-1 whitespace-pre-line`}>
{item.text}
</p>

</div>

)

})}

                       {tab === 'timeline' && timeline.map((item,i)=>{

const color = {
log:'border-pink-300',
medical:'border-blue-300',
travel:'border-green-300',
dev:'border-purple-300'
}

const label = {
log:'📅 日常',
medical:'🏥 醫療',
travel:'✈️ 旅行',
dev:'📊 發展'
}

return (
<div key={i} className={`bg-white p-4 rounded-2xl shadow-sm border-l-4 ${color[item.type]}`}>

<div className="flex justify-between mb-1">
<span className={`${T.small} text-gray-400`}>
{item.date}
</span>

<span className={`${T.small} font-bold text-gray-500`}>
{label[item.type]}
</span>
</div>

<h3 className={`${T.h3} font-bold text-gray-800`}>
{item.title}
</h3>

{item.text && (
<p className={`${T.small} text-gray-600 mt-1 whitespace-pre-line`}>
{item.text}
</p>
)}

</div>
)

})}


{tab === 'log' && data.logs.map((log, i) => (
    <SmartLog
        key={i}
        log={log}
        styles={T}
        renderIcon={renderIcon}
    />
))}
                        
                        {tab === 'dev' && (
                            data.development.length > 0 ? (
                                data.development.map((item, i) => <DevelopmentCard key={i} item={item} styles={T} renderIcon={renderIcon} />)
                            ) : (
                                <div className="text-center py-10">
                                    <div className="text-4xl mb-3">📊</div>
                                    <p className="text-gray-400 text-sm">還沒有發展評估資料喔！<br/>請在 Development 分頁新增</p>
                                </div>
                            )
                        )}
                    </div>
                    <div className="text-center text-[10px] text-gray-400 mt-6">Designed for Meimei | 2026 DevReport</div>
                </div>
            );
        };

        // --- 🔒 新增：應用程式主入口 (負責鎖屏邏輯) ---
        const App = () => {
            const [unlocked, setUnlocked] = useState(false);
            const [input, setInput] = useState("");
            const [errorMsg, setErrorMsg] = useState("");

            // 檢查是否曾經登入過 (可選：如果要關掉網頁就重鎖，把這段 localStorage 註解掉即可)
            useEffect(() => {
                if(localStorage.getItem('mm_unlocked') === 'true') {
                    setUnlocked(true);
                }
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (input === PASSCODE) {
                    setUnlocked(true);
                    localStorage.setItem('mm_unlocked', 'true'); // 記住登入狀態
                } else {
                    setErrorMsg("密碼錯誤，請試試妹妹生日");
                    setInput("");
                }
            };

            if (!unlocked) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-pink-50/50">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center border-2 border-white">
                            <div className="bg-pink-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-inner">🔒</div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">請輸入通關密碼</h2>
                            <p className="text-gray-400 text-sm mb-6">為了保護隱私，請輸入密碼以繼續</p>
                            
                            <form onSubmit={handleLogin}>
                                <input 
                                    type="number" pattern="\d*" 
                                    placeholder="輸入密碼..." 
                                    className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-center text-lg mb-3 focus:ring-2 ring-pink-400 outline-none transition-all"
                                    value={input}
                                    onChange={(e) => {setInput(e.target.value); setErrorMsg("");}}
                                    autoFocus
                                />
                                {errorMsg && <p className="text-red-500 text-sm mb-3 font-bold">{errorMsg}</p>}
                                <button type="submit" className="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-pink-200 transition-all active:scale-95">
                                    解鎖 🔓
                                </button>
                            </form>
                            <p className="mt-6 text-xs text-gray-300">Meimei's Growth Record</p>
                        </div>
                    </div>
                );
            }

            return <GrowthDashboard />;
        };

        const rootElement = document.getElementById("root");
const root = ReactDOM.createRoot(rootElement);
root.render(React.createElement(App));
    </script>
</body>

</html>
