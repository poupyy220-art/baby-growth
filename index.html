<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妹妹成長紀錄 v23.0 (Secure)</title>
    
    <meta name="apple-mobile-web-app-title" content="妹妹紀錄">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#fff1f2">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
	
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>


    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff1f2;
            background-image: radial-gradient(#fecdd3 1px, transparent 1px);
            background-size: 20px 20px;
            padding-bottom: 80px;
            touch-action: manipulation; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 載入動畫 (改為只在 dashboard 內部使用，或移除全域 loader 以免擋住鎖屏) */
        .spinner { font-size: 3rem; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .tab-btn-active { background-color: #ec4899; color: white; box-shadow: 0 4px 6px -1px rgba(236, 72, 153, 0.4); }
        .tab-btn-inactive { background-color: white; color: #6b7280; border: 1px solid #f3f4f6; }
        
        /* 鎖屏輸入框特效 */
        .lock-input:focus { ring: 2px solid #ec4899; outline: none; border-color: #ec4899; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const Recharts = window.Recharts;

        if (!Recharts) {
            document.getElementById("root").innerHTML = "Recharts failed to load";
        }
        const { 
            LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
            RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis 
        } = Recharts;

        const SHEET_URLS = {
            growth:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRn9lQVOTboOyw4K5u-a6J5MsN7hw23c2tp4YwXyGtitBgWZlDf72G--tLY4hPdt7UUasrHHuqNUc5W/pub?gid=0&single=true&output=csv",
            medical: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRn9lQVOTboOyw4K5u-a6J5MsN7hw23c2tp4YwXyGtitBgWZlDf72G--tLY4hPdt7UUasrHHuqNUc5W/pub?gid=326886357&single=true&output=csv",
            travel:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRn9lQVOTboOyw4K5u-a6J5MsN7hw23c2tp4YwXyGtitBgWZlDf72G--tLY4hPdt7UUasrHHuqNUc5W/pub?gid=2140673283&single=true&output=csv",
            logs:    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRn9lQVOTboOyw4K5u-a6J5MsN7hw23c2tp4YwXyGtitBgWZlDf72G--tLY4hPdt7UUasrHHuqNUc5W/pub?gid=491644359&single=true&output=csv",
            development: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRn9lQVOTboOyw4K5u-a6J5MsN7hw23c2tp4YwXyGtitBgWZlDf72G--tLY4hPdt7UUasrHHuqNUc5W/pub?gid=248325933&single=true&output=csv",
            milestones: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRn9lQVOTboOyw4K5u-a6J5MsN7hw23c2tp4YwXyGtitBgWZlDf72G--tLY4hPdt7UUasrHHuqNUc5W/pub?gid=593137954&single=true&output=csv"
        };
        const BIRTH_DATE = new Date(2024, 11, 26); 
        const PASSCODE = "20241226"; 

        const parseDate = (dateStr) => {
            if (!dateStr) return new Date(0);
            try {
                if (dateStr.includes('/')) {
                    const parts = dateStr.split('/');
                    if (parts.length === 3) return new Date(parts[0], parts[1] - 1, parts[2]);
                }
                return new Date(dateStr);
            } catch (e) { return new Date(0); }
        };

        const calculateAge = () => {
            const today = new Date();
            let years = today.getFullYear() - BIRTH_DATE.getFullYear();
            let months = today.getMonth() - BIRTH_DATE.getMonth();
            let days = today.getDate() - BIRTH_DATE.getDate();
            if (days < 0) {
                months--;
                days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
            }
            if (months < 0) { years--; months += 12; }
            return `${years}Y ${months}M ${days}D`;
        };

        const calculateDays = () => Math.floor((new Date() - BIRTH_DATE) / (1000 * 60 * 60 * 24));
        const calculateBirthdayCountdown = () => {
            const today = new Date();
            let nextBday = new Date(today.getFullYear(), BIRTH_DATE.getMonth(), BIRTH_DATE.getDate());
            if (today > nextBday) nextBday.setFullYear(today.getFullYear() + 1);
            return Math.ceil((nextBday - today) / (1000 * 60 * 60 * 24));
        };
        const calculateProgress = () => {
            const total = new Date(BIRTH_DATE.getFullYear() + 2, BIRTH_DATE.getMonth(), BIRTH_DATE.getDate()) - BIRTH_DATE;
            return Math.min(100, Math.max(0, Math.round(((new Date() - BIRTH_DATE) / total) * 100)));
        };

        const IconBase = ({ children, color = "currentColor", size, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const IconPaths = {
            Baby: <path d="M9 12h.01M15 12h.01M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"/>,
            Ruler: <><path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.41 2.41 0 0 1 0-3.4l2.6-2.6a2.41 2.41 0 0 1 3.4 0Z"/><path d="m14.5 12.5 2-2"/></>,
            Plane: <path d="M2 12h5M13 12h8M4 17.5c2.5-3 5.5-6.5 10-6.5 2.5 0 5 .5 6.5 1.5 1.5 1 2 2.5 2 4s-1.5 3-4 3c-3 0-5.5-1-8-3M16 11V3L8 8"/>,
            Save: <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8M7 3v5h8"/>,
            Aa: <path d="M4 20h16M12 4l-6 12m6-12 6 12M8 13h8"/>,
            Bot: <><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M12 8V4H8M2 14h2m16 0h2"/></>,
            Brain: <path d="M9.5 4.5a2.5 2.5 0 0 1 5 0 2.5 2.5 0 0 1-2.5 2.5M12 7v.5M12 21v-2"/>,
            Eye: <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>,
            CloudSun: <path d="M12 2v2m-7.07.93 1.41 1.41M20 12h2"/>
        };
        const Icons = Object.keys(IconPaths).reduce((acc, k) => { acc[k] = (p) => <IconBase {...p}>{IconPaths[k]}</IconBase>; return acc; }, {});

        const DevelopmentRadar = ({ data, logScores }) => {
            const scores = { gross_motor:0, fine_motor:0, language:0, cognitive:0, social:0 };
            (data || []).forEach(d => { if(scores[d.domain] !== undefined) scores[d.domain] += (d.stage === "achieved" ? 2 : 1); });
            Object.keys(scores).forEach(k => { scores[k] += (logScores?.[k] || 0) * 0.5; });	
            const radarData = [
                {subject:"大動作",value:scores.gross_motor}, {subject:"精細動作",value:scores.fine_motor},
                {subject:"語言",value:scores.language}, {subject:"認知",value:scores.cognitive}, {subject:"社交",value:scores.social}
            ];
            return (
                <div className="h-[260px] w-full">
                    <ResponsiveContainer><RadarChart data={radarData}><PolarGrid /><PolarAngleAxis dataKey="subject" /><PolarRadiusAxis /><Radar dataKey="value" stroke="#8b5cf6" fill="#8b5cf6" fillOpacity={0.4}/></RadarChart></ResponsiveContainer>
                </div>
            );
        };

        const SmartLog = ({ log, styles }) => (
            <div className="bg-white rounded-2xl p-5 shadow-sm border-l-4 border-pink-300 mb-4 transition-all">
                <div className="flex justify-between items-start mb-2">
                    <span className={`${styles.small} bg-pink-50 text-pink-600 px-2 py-1 rounded-full font-bold`}>{log.date}</span>
                    <span className={`${styles.small} text-indigo-500 flex items-center gap-1 font-bold bg-indigo-50 px-2 py-1 rounded-full`}><Icons.Bot size={styles.iconVal}/> {log.tag}</span>
                </div>
                <h3 className={`${styles.h3} font-bold text-gray-800 mb-3`}>{log.title}</h3>
                <div className="bg-gray-50 p-4 rounded-xl mb-3 border border-gray-100 text-sm">
                     <div className="text-gray-400 font-bold mb-1 flex items-center gap-1"><Icons.Eye size={styles.iconVal}/> 家長觀察</div>
                     <div className="text-gray-700 whitespace-pre-line">{log.parent_text}</div>
                </div>
                {log.ai_text && (
                    <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 text-sm">
                         <div className="text-indigo-600 font-bold mb-1 flex items-center gap-1"><Icons.Brain size={styles.iconVal}/> AI 分析</div>
                         <div className="text-indigo-900 whitespace-pre-line">{log.ai_text}</div>
                    </div>
                )}
            </div>
        );

        const DevelopmentCard = ({ item, styles }) => (
            <div className="bg-white rounded-2xl p-5 shadow-sm border-l-4 border-purple-400 mb-4">
                <div className="flex justify-between items-center mb-2">
                    <span className={styles.small + " bg-purple-50 text-purple-600 px-3 py-1 rounded-full"}>{item.date}</span>
                    <span className={styles.small + " px-2 py-1 rounded-full bg-green-100 text-green-700"}>{item.stage}</span>
                </div>
                <h3 className={styles.h3 + " font-bold text-gray-800"}>{item.skill}</h3>
                <div className="bg-gray-50 p-3 rounded-xl my-3 text-sm">
                    <div className="text-gray-400 font-bold mb-1">發展分析</div>
                    <div>{item.analysis}</div>
                </div>
            </div>
        );

        const GrowthDashboard = () => {
            const [tab, setTab] = useState('journey');
            const [loading, setLoading] = useState(true);
            const [data, setData] = useState({ growth:[], medical:[], travel:[], logs:[], development:[], milestones:[] });
            const [largeText, setLargeText] = useState(false);

            const T = useMemo(() => largeText ? 
                { container: "max-w-3xl", h1: "text-2xl", h3: "text-xl", body: "text-lg", small: "text-sm", iconVal: 20 } : 
                { container: "max-w-md md:max-w-2xl", h1: "text-xl", h3: "text-base", body: "text-sm", small: "text-xs", iconVal: 16 }, [largeText]);

            const fetchCSV = (url) => new Promise(res => Papa.parse(url, { download: true, header: true, complete: r => res(r.data), error: () => res([]) }));

            useEffect(() => {
                const load = async () => {
                    const [g, m, t, l, d, ms] = await Promise.all(Object.values(SHEET_URLS).map(u => fetchCSV(u)));
                    setData({ 
                        growth: g.filter(r=>r.month),
                        medical: m.sort((a,b)=>parseDate(b.date)-parseDate(a.date)),
                        travel: t.sort((a,b)=>parseDate(b.date)-parseDate(a.date)),
                        logs: l.sort((a,b)=>parseDate(b.date)-parseDate(a.date)),
                        development: d.sort((a,b)=>parseDate(b.date)-parseDate(a.date)),
                        milestones: ms
                    });
                    setLoading(false);
                };
                load();
            }, []);

            const logDomainScores = useMemo(() => {
                const s = { gross_motor:0, fine_motor:0, language:0, cognitive:0, social:0 };
                data.logs.forEach(log => {
                    const txt = (log.title + log.parent_text).toLowerCase();
                    if (txt.match(/走|跑|站|爬|扶/)) s.gross_motor++;
                    if (txt.match(/抓|拿|捏|按/)) s.fine_motor++;
                    if (txt.match(/叫|說|講|爸|媽/)) s.language++;
                    if (txt.match(/模仿|理解|學/)) s.cognitive++;
                    if (txt.match(/笑|抱|互動/)) s.social++;
                });
                return s;
            }, [data.logs]);

            const journey = useMemo(() => [
                ...data.medical.filter(r=>r.type==="vaccine").map(r=>({date:r.date, title:r.title, text:r.note, type:'medical'})),
                ...data.travel.map(r=>({date:r.date, title:r.title, text:r.highlight, type:'travel'})),
                ...data.development.map(r=>({date:r.date, title:r.title, text:r.analysis, type:'dev'}))
            ].sort((a,b)=>parseDate(b.date)-parseDate(a.date)), [data]);

            if (loading) return <div className="fixed inset-0 bg-pink-50 flex items-center justify-center font-bold text-pink-500 z-50">同步資料中...</div>;

            return (
                <div className={`${T.container} mx-auto px-4 pb-20`}>
                    <div className="bg-white rounded-3xl p-5 text-center shadow-sm mt-4 relative border border-white">
                        <div className="flex justify-between mb-4">
                            <button onClick={()=>setLargeText(!largeText)} className="text-xs bg-gray-100 px-3 py-1.5 rounded-full font-bold flex items-center gap-1"><Icons.Aa size={14}/> {largeText?'標準':'大字'}</button>
                            <button className="text-xs bg-green-500 text-white px-3 py-1.5 rounded-full font-bold flex items-center gap-1"><Icons.Save size={14}/> 備份</button>
                        </div>
                        <div className="bg-pink-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 text-3xl">👶</div>
                        <h1 className={`${T.h1} font-bold text-gray-800`}>妹妹成長紀錄</h1>
                        <div className="mt-3 flex flex-wrap justify-center gap-2">
                            <span className="bg-white px-2 py-1 rounded-full border border-pink-100 text-xs font-bold">{calculateAge()}</span>
                            <span className="bg-white px-2 py-1 rounded-full border border-indigo-100 text-xs font-bold text-indigo-600">{calculateDays()} days</span>
                        </div>
                        <div className="mt-4">
                            <div className="w-full bg-pink-100 rounded-full h-2 overflow-hidden"><div className="bg-pink-500 h-2 transition-all" style={{width:`${calculateProgress()}%`}}></div></div>
                            <div className="text-[10px] text-pink-500 font-bold mt-1">成長進度 {calculateProgress()}%</div>
                        </div>
                    </div>

                    <div className="flex gap-2 mt-4 overflow-x-auto pb-1 no-scrollbar justify-center">
                        {['journey','log','dev','health'].map(t => (
                            <button key={t} onClick={()=>setTab(t)} className={`px-5 py-2 rounded-full text-xs font-bold transition-all ${tab===t ? 'tab-btn-active':'tab-btn-inactive'}`}>
                                {t==='journey'?'⭐ 故事':t==='health'?'🏥 醫療':t==='dev'?'📊 發展':'📅 日誌'}
                            </button>
                        ))}
                    </div>

                    <div className="mt-4 space-y-3">
                        {tab === 'journey' && journey.map((item, i) => (
                            <div key={i} className={`bg-white p-5 rounded-2xl shadow-sm border-l-4 ${item.type==='medical'?'border-blue-300':item.type==='travel'?'border-green-300':'border-purple-300'}`}>
                                <div className="flex justify-between text-xs text-gray-400 mb-1"><span>{item.date}</span><span className="font-bold">{item.type==='medical'?'🏥 醫療':item.type==='travel'?'✈️ 旅行':'📊 發展'}</span></div>
                                <h3 className={`${T.h3} font-bold text-gray-800`}>{item.title}</h3>
                                <p className="text-xs text-gray-600 mt-1">{item.text}</p>
                            </div>
                        ))}
                        {tab === 'log' && data.logs.map((log, i) => <SmartLog key={i} log={log} styles={T} />)}
                        {tab === 'dev' && (
                            <>
                                <div className="bg-white p-4 rounded-3xl shadow-sm border border-purple-100 mb-4">
                                    <h3 className="text-xs font-bold text-purple-700 mb-2">發展雷達</h3>
                                    <DevelopmentRadar data={data.development} logScores={logDomainScores}/>
                                </div>
                                {data.development.map((item, i) => <DevelopmentCard key={i} item={item} styles={T} />)}
                            </>
                        )}
                        {tab === 'health' && data.medical.map((rec, i) => (
                            <div key={i} className={`bg-white p-4 rounded-2xl shadow-sm border-l-4 ${rec.type==='sick'?'border-orange-300':'border-blue-300'}`}>
                                <div className="flex justify-between text-xs text-gray-400"><span>{rec.date}</span><span className={`px-1 rounded text-white ${rec.type==='sick'?'bg-orange-400':'bg-blue-400'}`}>{rec.loc}</span></div>
                                <h3 className={`${T.h3} font-bold text-gray-800 mt-1`}>{rec.title}</h3>
                                <p className="text-xs text-gray-500 mt-1">{rec.note}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [unlocked, setUnlocked] = useState(localStorage.getItem('mm_unlocked') === 'true');
            const [input, setInput] = useState("");
            const handleLogin = (e) => {
                e.preventDefault();
                if (input === PASSCODE) { setUnlocked(true); localStorage.setItem('mm_unlocked', 'true'); }
                else { alert("密碼錯誤"); setInput(""); }
            };
            if (!unlocked) return (
                <div className="min-h-screen flex items-center justify-center bg-pink-50 p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
                        <div className="text-4xl mb-4">🔒</div>
                        <h2 className="text-xl font-bold mb-6 text-gray-800">輸入密碼以解鎖</h2>
                        <form onSubmit={handleLogin}>
                            <input type="number" className="w-full border rounded-xl p-3 text-center mb-4 text-lg" value={input} onChange={e=>setInput(e.target.value)} autoFocus />
                            <button className="w-full bg-pink-500 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition">解鎖 🔓</button>
                        </form>
                    </div>
                </div>
            );
            return <GrowthDashboard />;
        };

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
